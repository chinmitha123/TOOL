<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Profile Card</title>
    <style>
        /* CSS RESET & VARIABLES */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* PROFILE CARD CONTAINER */
        .profile-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
            overflow: hidden;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .profile-card:hover {
            transform: translateY(-5px);
        }

        /* HEADER / BACKGROUND HERO */
        .card-header {
            background: linear-gradient(to right, #4facfe 0%, #00f2fe 100%);
            height: 120px;
            position: relative;
        }

        /* AVATAR */
        .avatar-container {
            width: 110px;
            height: 110px;
            margin: -55px auto 10px auto;
            position: relative;
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: #fff;
            padding: 5px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            object-fit: cover;
        }

        .status-badge {
            width: 15px;
            height: 15px;
            background-color: #2ecc71;
            border: 2px solid #fff;
            border-radius: 50%;
            position: absolute;
            bottom: 5px;
            right: 5px;
        }

        /* STUDENT CORE DETAILS */
        .student-name {
            font-size: 1.5rem;
            color: #2d3748;
            margin-bottom: 4px;
        }

        .student-id {
            font-size: 0.85rem;
            color: #718096;
            font-weight: 600;
            letter-spacing: 0.5px;
            margin-bottom: 15px;
        }

        /* BIO & INFO SECTION */
        .profile-body {
            padding: 0 25px 25px 25px;
        }

        .student-bio {
            font-size: 0.9rem;
            color: #4a5568;
            line-height: 1.5;
            margin-bottom: 20px;
        }

        /* DETAILS TABLE/LIST */
        .details-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            text-align: left;
            border-top: 1px solid #e2e8f0;
            border-bottom: 1px solid #e2e8f0;
            padding: 15px 0;
            margin-bottom: 20px;
        }

        .info-group .label {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: #a0aec0;
            font-weight: bold;
            display: block;
            margin-bottom: 2px;
        }

        .info-group .value {
            font-size: 0.95rem;
            color: #2d3748;
            font-weight: 500;
        }

        /* INTERACTIVE BUTTON */
        .btn-toggle {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 0.9rem;
            font-weight: 600;
            border-radius: 20px;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s ease;
        }

        .btn-toggle:hover {
            background: #5a67d8;
        }

        /* HIDDEN CONTACT SECTION (JS Controlled) */
        .contact-info {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out, margin-top 0.3s ease;
            text-align: left;
            background: #f7fafc;
            border-radius: 8px;
        }

        .contact-info.show {
            max-height: 100px; /* Adjust based on content height */
            margin-top: 15px;
            padding: 12px;
            border: 1px solid #edf2f7;
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <div class="card-header"></div>

        <div class="avatar-container">
            <img src="https://unsplash.com/photos/man-wearing-headphones-while-sitting-on-chair-in-front-of-macbook-4-EeTnaC1S4" alt="Student Photo" class="avatar" id="student-avatar">
            <div class="status-badge" title="Active Student"></div>
        </div>

        <div class="profile-body">
            <h2 class="student-name" id="student-name">Alex Morgan</h2>
            <div class="student-id">ID: #STU-2026-8941</div>
            
            <p class="student-bio">
                Passionate Computer Science major specializing in Frontend Development and UI/UX design. Club head of the Tech Society.
            </p>

            <div class="details-grid">
                <div class="info-group">
                    <span class="label">Course</span>
                    <span class="value" id="student-course">B.Tech CSE</span>
                </div>
                <div class="info-group">
                    <span class="label">Semester</span>
                    <span class="value">6th Semester</span>
                </div>
                <div class="info-group">
                    <span class="label">GPA</span>
                    <span class="value" style="color: #2ecc71; font-weight: bold;">3.84 / 4.0</span>
                </div>
                <div class="info-group">
                    <span class="label">Blood Group</span>
                    <span class="value">O- Positive</span>
                </div>
            </div>

            <button class="btn-toggle" id="toggle-btn">View Contact Details</button>

            <div class="contact-info" id="contact-panel">
                <div class="info-group" style="margin-bottom: 8px;">
                    <span class="label">Email</span>
                    <span class="value" style="font-size: 0.85rem;">alex.morgan@university.edu</span>
                </div>
                <div class="info-group">
                    <span class="label">Phone</span>
                    <span class="value" style="font-size: 0.85rem;">+1 (555) 019-2834</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const toggleBtn = document.getElementById('toggle-btn');
            const contactPanel = document.getElementById('contact-panel');

            toggleBtn.addEventListener('click', () => {
                // Toggle the 'show' class to trigger CSS transition
                contactPanel.classList.toggle('show');

                // Update button text based on state
                if (contactPanel.classList.contains('show')) {
                    toggleBtn.textContent = 'Hide Contact Details';
                    toggleBtn.style.background = '#e53e3e'; // Changes button to red when open
                } else {
                    toggleBtn.textContent = 'View Contact Details';
                    toggleBtn.style.background = '#667eea'; // Reverts to original color
                }
            });
        });
    </script>
</body>
</html>
